<!DOCTYPE html>
<html>
<head>
    <title>Key System</title>
</head>
<body>

<h1>Générateur de clé</h1>

<button onclick="createKey()">Générer une clé</button>
<p id="key"></p>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const supabaseUrl = "https://pzdodoygspssikcpvvrq.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB6ZG9kb3lnc3Bzc2lrY3B2dnJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAxNzAxNjQsImV4cCI6MjA5NTc0NjE2NH0.YeF_cN2-lrnf-WBxntuA0723KB6qK_l5cYUBFVzUzH0";

const client = supabase.createClient(supabaseUrl, supabaseKey);

function generateKey() {
    const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
    let key = "";

    for (let i = 0; i < 16; i++) {
        if (i > 0 && i % 4 === 0) key += "-";
        key += chars[Math.floor(Math.random() * chars.length)];
    }

    return key;
}

async function createKey() {
    const key = generateKey();

    const expiresAt = new Date();
    expiresAt.setHours(expiresAt.getHours() + 24);

    const { data, error } = await client
        .from("keys")
        .insert([
            {
                key: key,
                expires_at: expiresAt.toISOString()
            }
        ])
        .select();

    console.log("DATA:", data);
    console.log("ERROR:", error);

    if (error) {
        alert(error.message);
        return;
    }

    document.getElementById("key").innerText = key;
}
</script>

</body>
</html>
